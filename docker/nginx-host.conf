# /etc/nginx/sites-available/onlyoffice (Ubuntu) — Nginx host-side TLS termination
#
# Coloca este archivo en la EC2, ajusta `server_name` si tu dominio cambia,
# y luego:
#   sudo ln -s /etc/nginx/sites-available/onlyoffice /etc/nginx/sites-enabled/onlyoffice
#   sudo nginx -t && sudo systemctl reload nginx
#
# Asume que certbot ya emitió cert para editor.embitech.cloud y lo dejó en
# /etc/letsencrypt/live/editor.embitech.cloud/.

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name editor.embitech.cloud;

    # Validación ACME de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS termination + reverse proxy al contenedor ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name editor.embitech.cloud;

    ssl_certificate     /etc/letsencrypt/live/editor.embitech.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/editor.embitech.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP intencionalmente NO restrictivo para permitir el iframe desde tu CRM.
    # Si quieres restringir, usa: Content-Security-Policy "frame-ancestors https://tucrm.embitech.es;"

    # Tamaño máximo de upload (documentos grandes)
    client_max_body_size 100m;

    # Buffer del request (uploads grandes sin escritura a disco)
    client_body_buffer_size 1m;

    # AGPL v3 Sección 13: "Remote Network Interaction" — ofrecer fuente al usuario del servicio.
    # Redirección al repo público del fork con todas las modificaciones aplicadas.
    location = /source {
        return 302 https://github.com/crmlegal-fork/onlyoffice-fork;
    }
    location = /agpl-source {
        return 302 https://github.com/crmlegal-fork/onlyoffice-fork;
    }

    # Bloquear el editor de prueba "example" — no debe ser accesible públicamente.
    # (Adicionalmente apply-branding.sh elimina el servicio del supervisor en build,
    #  pero este bloqueo de Nginx asegura defensa en profundidad.)
    location ~ ^/example(/|$) {
        return 404;
    }

    # Proxy al contenedor del DocumentServer
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade (colaboración en tiempo real)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarded headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeouts largos para conexiones WebSocket persistentes
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
        proxy_connect_timeout 60;
    }

    # Validación ACME (renovación de cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
