# docker-compose.prod.yml — Despliegue en EC2
#
# Diferencias respecto al docker-compose.yml local:
#   - Bind mounts a /srv/onlyoffice/* (EBS) en lugar de docker volumes
#   - NO expone el puerto 80 al host directamente — el Nginx host-side lo hará
#     vía 127.0.0.1:8080 (loopback only, evita exponer HTTP directo a internet)
#   - Variables sensibles desde .env.prod (no commitear)
#   - Restart policy más estricta

services:
  documentserver:
    image: onlyoffice-fork:local
    container_name: onlyoffice-ds
    restart: always
    ports:
      - "127.0.0.1:8080:80"     # Solo accesible desde el host (Nginx hace proxy)
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "${JWT_SECRET}"
      # IMPORTANTE: header debe coincidir con el que firma el CRM. Producción
      # actual usa "Authorization" (NO el default oficial "AuthorizationJwt").
      JWT_HEADER: "${JWT_HEADER:-Authorization}"
      JWT_IN_BODY: "true"
      USE_UNAUTHORIZED_STORAGE: "false"
    volumes:
      # Bind mounts heredados del deploy previo (preserva BD + datos).
      # Override con env DATA_ROOT si quieres cambiar la ruta.
      - ${DATA_ROOT:-/home/ssm-user/onlyoffice}/data:/var/www/onlyoffice/Data
      - ${DATA_ROOT:-/home/ssm-user/onlyoffice}/logs:/var/log/onlyoffice
      - ${DATA_ROOT:-/home/ssm-user/onlyoffice}/lib:/var/lib/onlyoffice
      - ${DATA_ROOT:-/home/ssm-user/onlyoffice}/db:/var/lib/postgresql
      # Volumes para servicios stateless (RabbitMQ, Redis, fuentes).
      - ds_rabbitmq:/var/lib/rabbitmq
      - ds_redis:/var/lib/redis
      - ds_fonts:/usr/share/fonts/truetype/custom
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  ds_rabbitmq: {}
  ds_redis:    {}
  ds_fonts:    {}
